<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conecta Singular - Cadastro</title>

    <link rel="stylesheet" href="../CSS/menu.css">
    <link rel="stylesheet" href="../CSS/cadastro.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <script src="../SCRIPTS/cadastro.js" defer></script>
</head>

<body class="pagina-cadastro">

    <!-- MENU -->

    <nav>
        <ul class="menu">

            <li class="logo">
                <a href="../index.html">
                    <img src="../images/logo-home.png" alt="Logo">
                </a>
            </li>

            <li><a class="botao1" href="../index.html">INÍCIO</a></li>
            <li><a class="botao2" href="vagas.html">VAGAS</a></li>
            <li><a class="botao3" href="sobreoprojeto.html">SOBRE O PROJETO</a></li>
            <li><a class="botao4" href="contatos.html">CONTATOS</a></li>
            <li><a class="botao1" href="empresasparceiras.html">EMPRESAS PARCEIRAS</a></li>

        </ul>
    </nav>

    <!-- CADASTRO -->

    <section class="cadastro-container">

        <form class="form-cadastro">

            <h1>Crie sua conta</h1>

            <div class="grupo">
                <label>Nome completo</label>
                <input type="text" id="nome" placeholder="Digite seu nome">
            </div>

            <div class="grupo">
                <label>E-mail</label>
                <input type="email" id="email" placeholder="Digite seu e-mail">
            </div>

            <div class="grupo">
                <label>Telefone</label>
                <input type="tel" id="telefone" placeholder="(00) 00000-0000">
            </div>

            <div class="grupo">
                <label>Senha</label>
                <input type="password" id="senha" placeholder="Crie uma senha">
            </div>

            <div class="grupo">
                <label>Confirmar senha</label>
                <input type="password" id="confirmarSenha" placeholder="Confirme sua senha">
            </div>

            <button type="submit" class="btn-cadastrar">
                Cadastrar
            </button>

            <p class="texto-cadastro">
                Já possui conta? <a href="login.html">Entrar</a>
            </p>

        </form>

    </section>
        <!-- ================= FOOTER ================= -->

    <footer class="rodape-contatos">

        <div class="rodape-conteudo">

            <p>
                &copy; 2026 Conecta Singular. Todos os direitos reservados.
            </p>

        </div>

    </footer>

</body>

</html>
